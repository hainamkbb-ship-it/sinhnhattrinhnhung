<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    text-align:center;
    background:black;
    overflow:hidden;
}

h1{
    margin-top:50px;
    font-size:40px;
}

.gallery{
    margin-top:40px;
}

.gallery img{
    width:220px;
    margin:10px;
    border-radius:15px;
    box-shadow:0 0 15px pink;
}

/* sao */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

</style>
</head>

<body>

<h1>🎂 Happy Birthday My Love 🎂</h1>
<p>Chúc em sinh nhật thật hạnh phúc. Anh luôn ở đây, bên em ❤️</p>

<div class="gallery">
<img src="anh1.jpg">
<img src="anh2.jpg">
<img src="anh3.jpg">
</div>

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* tạo bầu trời sao */

for(let i=0;i<150;i++){

let star=document.createElement("div")

star.className="star"

star.style.left=Math.random()*window.innerWidth+"px"

star.style.top=Math.random()*window.innerHeight+"px"

star.style.animationDelay=Math.random()*3+"s"

document.body.appendChild(star)

}

</script>

</body>
</html>
